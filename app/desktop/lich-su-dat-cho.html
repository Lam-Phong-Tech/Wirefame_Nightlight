<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
<script src="../theme.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#e7e5df;}
  a{text-decoration:none;color:inherit;}
  .lk{transition:color .14s ease;}
  .lk:hover{color:#6d28d9;}
</style>
</helmet>

<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:34px 48px 64px;background:#e7e5df;font-family:'Inter',sans-serif;">
  <div style="max-width:1100px;margin-bottom:22px;display:flex;align-items:center;gap:14px;">
    <a href="trang-chu.html" style="font-size:13px;color:#6d28d9;background:#f1ebff;border-radius:20px;padding:7px 14px;font-weight:600;">‹ Trang chủ</a>
    <div style="font-size:13px;color:#8a8780;"><b style="color:#2b2a26;">Lịch sử đặt chỗ</b> — bấm tab để lọc theo trạng thái</div>
  </div>

  <div style="width:1100px;background:#f5f4f2;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.10);color:#1f1d29;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 34px;background:#fff;border-bottom:1px solid #ececec;">
      <div style="display:flex;align-items:center;gap:34px;"><a href="trang-chu.html" style="font-weight:800;font-size:20px;color:#6d28d9;">nightlife<span style="color:#1f1d29;">.hn</span></a><div style="display:flex;gap:22px;font-size:14px;color:#5b5870;font-weight:500;"><a href="trang-chu.html" class="lk">Trang chủ</a><a href="danh-sach-quan.html" class="lk">Tìm quán</a><a href="danh-sach-cast.html" class="lk">Cast</a><a href="xep-hang.html" class="lk">Bảng xếp hạng</a><a href="uu-dai.html" class="lk">Ưu đãi</a><span class="lk">Blog</span></div></div>
      <div style="display:flex;align-items:center;gap:14px;"><div style="font-size:13px;color:#6d28d9;background:#f1ebff;border-radius:20px;padding:6px 12px;font-weight:600;">VI · 日本語</div><a href="tai-khoan.html" class="lk" style="font-size:13px;color:#5b5870;">Tài khoản</a></div>
    </div>

    <div style="padding:26px 34px 8px;"><h2 style="font-size:24px;font-weight:800;">Lịch sử đặt chỗ</h2></div>
    <div style="padding:8px 34px 0;display:flex;gap:9px;flex-wrap:wrap;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4"><div onClick="{{ t.pick }}" style="{{ t.style }}">{{ t.label }}</div></sc-for>
    </div>
    <div style="padding:16px 34px 32px;display:flex;flex-direction:column;gap:12px;">
      <sc-for list="{{ list }}" as="b" hint-placeholder-count="5">
        <div style="display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #ececec;border-radius:14px;padding:14px 16px;box-shadow:0 3px 12px rgba(40,20,60,.06);">
          <span style="width:50px;height:50px;border-radius:12px;flex:none;background:{{ b.img }};"></span>
          <div style="flex:1;"><div style="font-weight:600;font-size:15px;">{{ b.place }}</div><div style="font-size:12.5px;color:#8a879a;margin-top:3px;">{{ b.meta }}</div></div>
          <span style="font-size:11.5px;font-weight:700;border-radius:10px;padding:5px 11px;color:{{ b.color }};background:{{ b.bg }};">{{ b.label }}</span>
          <sc-if value="{{ b.canCancel }}" hint-placeholder-val="{{ false }}"><span style="font-size:12.5px;color:#b03a4a;font-weight:600;border:1px solid #f1cdd3;border-radius:10px;padding:8px 14px;cursor:pointer;">Hủy</span></sc-if>
        </div>
      </sc-for>
      <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}"><div style="text-align:center;color:#8a879a;font-size:14px;padding:36px 0;">Chưa có đặt chỗ ở trạng thái này.</div></sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  renderVals(){
    var NL = window.NL, self = this, st = this.state;
    var status = st.status || 'all';
    var rows = NL.BOOKINGS.filter(function(b){ return status==='all' || b[2]===status; });
    var list = rows.map(function(b){ var bd=NL.bkBadge(b[2]); return { place:b[0], meta:b[1], img:NL.photo(b[3],360), label:bd.label, color:bd.color, bg:bd.bg, canCancel:b[2]==='new' }; });
    var tabs = [['all','Tất cả'],['new','Mới'],['done','Hoàn tất'],['cancelled','Đã hủy']].map(function(t){ return { label:t[1], style:NL.pill(status===t[0]), pick:function(){ self.setState({status:t[0]}); } }; });
    return { list:list, tabs:tabs, empty:list.length===0 };
  }
}
</script>
</body>
</html>
