<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#e7e5df;}
  a{text-decoration:none;color:inherit;}
  .btn{cursor:pointer;transition:filter .14s;}
  .btn:active{filter:brightness(.95);}
</style>
</helmet>

<div style="width:100%;min-height:100vh;box-sizing:border-box;padding:34px 24px 64px;background:#e7e5df;font-family:'Inter',sans-serif;">
  <div style="max-width:390px;margin:0 auto 18px;display:flex;align-items:center;gap:12px;">
    <a href="trang-chu.html" style="font-size:12.5px;color:#6d28d9;background:#f1ebff;border-radius:20px;padding:6px 13px;font-weight:600;">‹ Trang chủ</a>
    <div style="font-size:12px;color:#8a8780;">Ưu đãi &amp; Sự kiện</div>
  </div>

  <div style="margin:0 auto;width:390px;background:#f5f4f2;border-radius:32px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.16);color:#1f1d29;border:1px solid #e3e0da;">
    <div style="height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:13px;font-weight:700;background:#fff;"><span>21:00</span><span style="width:22px;height:11px;border:1.5px solid #1f1d29;border-radius:3px;display:inline-block;position:relative;"><span style="position:absolute;inset:1.5px;right:6px;background:#1f1d29;border-radius:1px;"></span></span></div>
    <div style="background:#fff;padding:8px 18px 12px;display:flex;align-items:center;justify-content:space-between;"><h2 style="font-size:19px;font-weight:800;">Ưu đãi hot</h2><a href="vi-uu-dai.html" style="font-size:12px;color:#6d28d9;font-weight:600;">Ví của tôi ›</a></div>

    <div style="padding:12px 18px;display:flex;flex-direction:column;gap:11px;">
      <sc-for list="{{ offers }}" as="o" hint-placeholder-count="6">
        <div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(40,20,60,.06);display:flex;">
          <div style="width:96px;flex:none;background:{{ o.img }};position:relative;"><span style="position:absolute;top:8px;left:8px;background:#ffd24d;color:#5a3d00;font-size:12px;font-weight:800;border-radius:9px;padding:3px 8px;">{{ o.value }}</span></div>
          <div style="padding:11px 12px;flex:1;"><div style="font-weight:700;font-size:13.5px;">{{ o.title }}</div><div style="font-size:11px;color:#8a879a;margin-top:2px;">{{ o.place }}</div><div style="margin-top:9px;display:flex;align-items:center;justify-content:space-between;"><span style="font-size:10px;color:#c0246a;background:#fce4ef;border-radius:8px;padding:3px 8px;font-weight:600;">{{ o.expiry }}</span><span onClick="{{ o.take }}" class="btn" style="font-size:11.5px;font-weight:700;border-radius:9px;padding:6px 12px;{{ o.btnStyle }}">{{ o.btnLabel }}</span></div></div>
        </div>
      </sc-for>
    </div>

    <div style="height:64px;background:#fff;border-top:1px solid #ececec;display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;">
      <a href="trang-chu.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/home.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Trang chủ</span></a>
      <a href="danh-sach-cast.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/geisha.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Cast</span></a>
      <a href="uu-dai.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/fluency/96/gift.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6d28d9;font-weight:600;">Ưu đãi</span></a>
      <a href="lich-su-dat-cho.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/calendar.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Đặt chỗ</span></a>
      <a href="tai-khoan.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/user.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Tài khoản</span></a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  renderVals(){
    var NL = window.NL, self = this, st = this.state;
    var taken = st.taken || {};
    var offers = NL.buildOffers().map(function(o,i){
      var t = !!taken[i];
      return {
        title:o.title, place:o.place, value:o.value, expiry:o.expiry, img:o.img,
        btnLabel: t ? 'Đã lưu ✓' : 'Lấy mã',
        btnStyle: t ? 'background:#e6f7ee;color:#177544;' : 'background:#6d28d9;color:#fff;',
        take:function(){ var n=Object.assign({},self.state.taken||{}); n[i]=true; self.setState({taken:n}); }
      };
    });
    return { offers:offers };
  }
}
</script>
</body>
</html>
