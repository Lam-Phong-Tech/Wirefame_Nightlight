<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f5f4f2;}
  a{text-decoration:none;color:inherit;}
  .hscroll{scrollbar-width:none;}
  .hscroll::-webkit-scrollbar{display:none;}
</style>
</helmet>


  <div style="margin:0 auto;width:100%;max-width:480px;background:#f5f4f2;min-height:100vh;overflow:hidden;box-shadow:0 0 20px rgba(0,0,0,.05);color:#1f1d29;font-family:'Inter',sans-serif;position:relative;">
    <div style="height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:13px;font-weight:700;background:#fff;"><span>21:00</span><span style="width:22px;height:11px;border:1.5px solid #1f1d29;border-radius:3px;display:inline-block;position:relative;"><span style="position:absolute;inset:1.5px;right:6px;background:#1f1d29;border-radius:1px;"></span></span></div>
    <div style="background:#fff;padding:8px 18px 8px;"><h2 style="font-size:19px;font-weight:800;">Xếp hạng {{ typeLabel }}</h2><p style="font-size:10.5px;color:#8a879a;margin-top:1px;">Tháng 6/2026 · Top 5</p></div>
    <div class="hscroll" style="padding:8px 18px 8px;display:flex;gap:7px;overflow-x:auto;background:#fff;">
      <sc-for list="{{ areas }}" as="a" hint-placeholder-count="5"><div onClick="{{ a.pick }}" style="{{ a.style }}">{{ a.label }}</div></sc-for>
    </div>
    <div style="padding:0 18px 12px;background:#fff;border-bottom:1px solid #ececec;"><div style="display:flex;gap:6px;background:#f3f2f5;border-radius:14px;padding:4px;"><div onClick="{{ pickCast }}" style="{{ segCast }}">Cast</div><div onClick="{{ pickQuan }}" style="{{ segQuan }}">Quán</div></div></div>

    <div style="padding:12px 18px;display:flex;flex-direction:column;gap:9px;">
      <sc-for list="{{ list }}" as="r" hint-placeholder-count="5">
        <div onClick="{{ r.open }}" style="display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #ececec;border-radius:13px;padding:10px 12px;cursor:pointer;">
          <span style="width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:{{ r.numColor }};background:{{ r.crown }};">{{ r.rank }}</span>
          <span style="width:44px;height:44px;border-radius:50%;flex:none;background:{{ r.img }};"></span>
          <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:14px;">{{ r.name }}</div><div style="font-size:10.5px;color:#8a879a;margin-top:1px;">{{ r.area }}</div></div>
          <span style="font-size:11px;color:#6d28d9;font-weight:700;">{{ r.metric }}</span>
        </div>
      </sc-for>
    </div>

    <div style="height:64px;background:#fff;border-top:1px solid #ececec;display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;">
      <a href="trang-chu.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/home.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Trang chủ</span></a>
      <a href="danh-sach-cast.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/geisha.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Cast</span></a>
      <a href="uu-dai.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/gift.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Ưu đãi</span></a>
      <a href="lich-su-dat-cho.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/calendar.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Đặt chỗ</span></a>
      <a href="tai-khoan.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/user.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Tài khoản</span></a>
    </div>
  </div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  get EXTRA(){
    return {
      dn:{ quan:[['Bana Lounge','Hải Châu','5.2k'],['Sun Bar','Sơn Trà','4.8k'],['Helio Night','Hải Châu','4.1k'],['Danang Velvet','Thanh Khê','3.6k'],['Moon KTV','NHS','3.2k']],
           cast:[['Lan · 22','Dịu dàng','★ 4.8'],['Thu · 24','Vui vẻ','★ 4.7'],['My · 23','Tiếng Nhật','★ 4.8'],['Ha · 21','Trẻ trung','★ 4.6'],['Vy · 25','Hát hay','★ 4.7']] },
      hp:{ quan:[['Hai Phong Bar','Lê Chân','3.9k'],['Port Lounge','Ngô Quyền','3.4k'],['Cat Ba Night','Đồ Sơn','2.9k'],['Red Dragon KTV','Hồng Bàng','2.5k'],['Sea Pearl','Hải An','2.1k']],
           cast:[['Linh · 23','Thân thiện','★ 4.7'],['Trang · 24','Phong cách','★ 4.6'],['Quynh · 22','Dịu dàng','★ 4.7'],['Hoa · 25','Duyên','★ 4.6'],['Yen · 21','Trẻ trung','★ 4.5']] }
    };
  }
  renderVals(){
    var NL = window.NL, self = this, st = this.state;
    var area = st.area || 'all', type = st.type || 'cast';
    var data = NL.RANK[area] || this.EXTRA[area] || NL.RANK.all;
    var list = NL.buildRank(data[type] || [], type).map(function(r){
      r.open = function(){
        if(type==='cast'){ try{localStorage.setItem('nl_cast', String(r.name).split(' · ')[0]);}catch(e){} location.href='chi-tiet-cast.html'; }
        else { location.href='danh-sach-quan.html'; }
      };
      return r;
    });
    var areas = [['all','Tổng hợp'],['hn','HN'],['hcm','HCM'],['dn','Đà Nẵng'],['hp','Hải Phòng']].map(function(a){
      return { label:a[1], style:NL.pillSm(area===a[0]), pick:function(){ self.setState({area:a[0]}); } };
    });
    return { list:list, areas:areas, typeLabel: type==='cast'?'Cast':'Quán', segCast:NL.seg(type==='cast'), segQuan:NL.seg(type==='quan'), pickCast:function(){ self.setState({type:'cast'}); }, pickQuan:function(){ self.setState({type:'quan'}); } };
  }
}
</script>
</body>
</html>
