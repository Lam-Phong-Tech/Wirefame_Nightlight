<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f5f4f2;}
  a{text-decoration:none;color:inherit;}
  .hscroll{scrollbar-width:none;}
  .hscroll::-webkit-scrollbar{display:none;}
</style>
</helmet>


  <div style="margin:0 auto;width:100%;max-width:480px;background:#f5f4f2;min-height:100vh;padding-bottom:20px;box-shadow:0 0 20px rgba(0,0,0,.05);color:#1f1d29;font-family:'Inter',sans-serif;position:relative;">
    
    <div style="background:#fff;padding:8px 18px 8px;"><h2 style="font-size:19px;font-weight:800;">Ví ưu đãi</h2></div>
    <div class="hscroll" style="padding:0 18px 12px;display:flex;gap:7px;overflow-x:auto;background:#fff;border-bottom:1px solid #ececec;">
      <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3"><div onClick="{{ t.pick }}" style="{{ t.style }}">{{ t.label }}</div></sc-for>
    </div>
    <div style="padding:12px 18px;display:flex;flex-direction:column;gap:11px;">
      <sc-for list="{{ list }}" as="c" hint-placeholder-count="3">
        <div style="background:#fff;border:1px solid #ececec;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(40,20,60,.06);{{ c.dim }}">
          <div style="padding:13px;display:flex;gap:12px;align-items:center;">
            <div style="width:58px;height:58px;border-radius:11px;border:1px solid #ececec;display:flex;align-items:center;justify-content:center;flex:none;"><img src="https://img.icons8.com/ios/200/000000/qr-code.png" style="width:46px;height:46px;" alt=""></div>
            <div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13.5px;">{{ c.title }}</div><div style="font-size:10.5px;color:#8a879a;margin-top:2px;">{{ c.place }}</div><span style="display:inline-block;margin-top:6px;font-size:9.5px;font-weight:700;border-radius:8px;padding:3px 8px;color:{{ c.color }};background:{{ c.bg }};">{{ c.label }}</span></div>
            <span style="font-size:13px;color:#6d28d9;font-weight:800;">{{ c.value }}</span>
          </div>
          <div style="border-top:1px dashed #e2e0e8;padding:9px 13px;font-size:10.5px;color:#8a879a;">{{ c.expiry }}</div>
        </div>
      </sc-for>
      <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}"><div style="text-align:center;color:#8a879a;font-size:13px;padding:28px 0;">Không có mã ở mục này.</div></sc-if>
    </div>

    <div style="position:sticky;bottom:0;z-index:99;height:64px;background:#fff;border-top:1px solid #ececec;display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;">
      <a href="trang-chu.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/home.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Trang chủ</span></a>
      <a href="danh-sach-cast.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/geisha.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Cast</span></a>
      <a href="uu-dai.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios-filled/100/6D28D9/gift.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6d28d9;font-weight:600;">Ưu đãi</span></a>
      <a href="lich-su-dat-cho.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/calendar.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Đặt chỗ</span></a>
      <a href="tai-khoan.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/user.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Tài khoản</span></a>
    </div>
  </div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  renderVals(){
    var NL = window.NL, self = this, st = this.state;
    var status = st.status || 'holding';
    var rows = NL.WALLET.filter(function(c){ return c[2]===status; });
    var list = rows.map(function(c){ var cd=NL.cpBadge(c[2]); return { title:c[0], place:c[1], expiry:c[3], value:c[4], label:cd.label, color:cd.color, bg:cd.bg, dim: c[2]==='holding'?'':'opacity:.62;' }; });
    var tabs = [['holding','Đang giữ chỗ'],['used','Đã dùng'],['expired','Hết hạn']].map(function(t){ return { label:t[1], style:NL.pillSm(status===t[0]), pick:function(){ self.setState({status:t[0]}); } }; });
    return { list:list, tabs:tabs, empty:list.length===0 };
  }
}
</script>
</body>
</html>
