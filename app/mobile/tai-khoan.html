<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../shared.js"></script>
<script src="../../support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#f5f4f2;}
  a{text-decoration:none;color:inherit;}
</style>
</helmet>


  <div style="margin:0 auto;width:100%;max-width:480px;background:#f5f4f2;min-height:100vh;padding-bottom:20px;box-shadow:0 0 20px rgba(0,0,0,.05);color:#1f1d29;font-family:'Inter',sans-serif;position:relative;">
    

    <div style="padding:14px 18px;background:#fff;">
      <div style="background:linear-gradient(135deg,#6d28d9,#3a1f6e);border-radius:16px;padding:18px;color:#fff;">
        <div style="display:flex;align-items:center;gap:12px;"><span style="width:50px;height:50px;border-radius:50%;background:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=70') center/cover;border:2px solid rgba(255,255,255,.5);"></span><div style="flex:1;"><div style="font-size:16px;font-weight:800;">{{ name }}</div><div style="font-size:11.5px;color:#e7d9ff;">{{ phone }}</div></div><span style="font-size:10px;font-weight:700;background:#ffd24d;color:#5a3d00;border-radius:9px;padding:4px 9px;">Hạng {{ tier }}</span></div>
        <div style="margin-top:14px;background:rgba(255,255,255,.14);border-radius:11px;padding:12px;"><div style="display:flex;justify-content:space-between;font-size:12px;"><span style="color:#e7d9ff;">Điểm thưởng</span><span style="font-weight:800;">{{ points }}</span></div><div style="height:6px;background:rgba(255,255,255,.25);border-radius:3px;margin-top:8px;"><div style="width:62%;height:100%;background:#ffd24d;border-radius:3px;"></div></div><div style="font-size:10.5px;color:#e7d9ff;margin-top:6px;">Cần thêm {{ need }} điểm lên hạng {{ nextTier }}</div></div>
      </div>
    </div>

    <div style="padding:0 18px;display:flex;flex-direction:column;">
      <sc-for list="{{ menu }}" as="m" hint-placeholder-count="5">
        <a href="{{ m.href }}" style="display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid #ececec;"><span style="width:36px;height:36px;border-radius:10px;background:#f1ebff;display:flex;align-items:center;justify-content:center;flex:none;"><img src="{{ m.icon }}" style="width:18px;height:18px;" alt=""></span><div style="flex:1;"><div style="font-size:13.5px;font-weight:600;">{{ m.title }}</div><div style="font-size:10.5px;color:#8a879a;margin-top:1px;">{{ m.sub }}</div></div><img src="https://img.icons8.com/ios/100/B6B3C0/chevron-right.png" style="width:15px;height:15px;" alt=""></a>
      </sc-for>
      <a href="dang-nhap.html" style="display:flex;align-items:center;gap:12px;padding:14px 4px;color:#b03a4a;"><span style="width:36px;height:36px;border-radius:10px;background:#fbe4e7;display:flex;align-items:center;justify-content:center;flex:none;"><img src="https://img.icons8.com/ios/100/B03A4A/exit.png" style="width:18px;height:18px;" alt=""></span><div style="flex:1;font-size:13.5px;font-weight:600;">Đăng xuất</div></a>
    </div>

    <div style="position:sticky;bottom:0;z-index:99;height:64px;background:#fff;border-top:1px solid #ececec;display:flex;align-items:center;justify-content:space-around;padding-bottom:6px;margin-top:8px;">
      <a href="trang-chu.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/home.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Trang chủ</span></a>
      <a href="danh-sach-cast.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/geisha.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Cast</span></a>
      <a href="uu-dai.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/gift.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Ưu đãi</span></a>
      <a href="lich-su-dat-cho.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios/100/B6B3C0/calendar.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#b6b3c0;">Đặt chỗ</span></a>
      <a href="tai-khoan.html" style="display:flex;flex-direction:column;align-items:center;gap:3px;"><img src="https://img.icons8.com/ios-filled/100/6D28D9/user.png" style="width:21px;height:21px;" alt=""><span style="font-size:10px;color:#6d28d9;font-weight:600;">Tài khoản</span></a>
    </div>
  </div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};
  renderVals(){
    var NL = window.NL, a = NL.ACCOUNT;
    var menu = [
      { title:'Đặt chỗ của tôi', sub:'Lịch sử & trạng thái', href:'lich-su-dat-cho.html', icon:'https://img.icons8.com/fluency/96/planner.png' },
      { title:'Ví ưu đãi', sub:'Mã giảm giá đang giữ', href:'vi-uu-dai.html', icon:'https://img.icons8.com/fluency/96/gift.png' },
      { title:'Cast yêu thích', sub:'Cast & quán đã lưu', href:'danh-sach-cast.html', icon:'https://img.icons8.com/fluency/96/like.png' },
      { title:'Hóa đơn & điểm', sub:'Gửi hóa đơn để tích điểm', href:'tai-khoan.html', icon:'https://img.icons8.com/fluency/96/invoice.png' },
      { title:'Cài đặt', sub:'Thông tin cá nhân, ngôn ngữ', href:'tai-khoan.html', icon:'https://img.icons8.com/fluency/96/settings.png' }
    ];
    return { name:a.name, phone:a.phone, tier:a.tier, points:a.points, nextTier:a.nextTier, need:a.need, menu:menu };
  }
}
</script>
</body>
</html>
